<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Matches site.webmanifest's theme_color — controls the mobile browser
         chrome/status-bar tint so installed/standalone launches feel native
         rather than showing the browser's default color. -->
    <meta name="theme-color" content="#F8FAFC" />
    <!--
      Anti-flash: applies the resolved theme to <html> before any CSS/React
      paints, so the page never flashes light-then-dark or dark-then-light.
      Must stay a small, blocking, synchronous script (no defer/async/module)
      placed before any other script tag. Defensive: localStorage/matchMedia
      can throw (private browsing, storage disabled) or be unavailable, and
      the stored blob can be corrupt/stale — any failure here must fall back
      to the app's default (light), never crash the page load.
    -->
    <script>
      (function () {
        try {
          var STORAGE_KEY = 'rentcar_appearance';
          var mode = 'light';
          try {
            var raw = window.localStorage.getItem(STORAGE_KEY);
            if (raw) {
              var parsed = JSON.parse(raw);
              if (parsed && (parsed.mode === 'light' || parsed.mode === 'dark' || parsed.mode === 'system')) {
                mode = parsed.mode;
              }
            }
          } catch (e) { /* storage unavailable or corrupt — keep default light */ }

          var resolved = mode;
          if (mode === 'system') {
            try {
              resolved = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            } catch (e) { resolved = 'light'; }
          }

          var root = document.documentElement;
          if (resolved === 'dark') root.classList.add('dark');
          else root.classList.remove('dark');
          root.style.colorScheme = resolved;

          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', resolved === 'dark' ? '#0F172A' : '#F8FAFC');
        } catch (e) { /* never block page load on theme resolution */ }
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Innovacar" />
    <title>InnovaCar | Premium SaaS Dashboard</title>

    <!--
      Safe default: almost every route in this SPA is an authenticated
      dashboard, login/reset flow, or a tokenized private link (see
      docs/seo-route-inventory.md) — none of that should ever be indexable.
      This is the tag search engines see in the raw HTML shell before React
      mounts. src/components/seo/SeoHead.tsx overrides it to "index,follow..."
      only on pages that are genuinely public (currently just /#/contact).
    -->
    <meta name="robots" content="noindex,follow,noarchive" />

    <!--
      Google Search Console HTML verification (alternative to the DNS TXT
      method — see docs/google-search-console-setup.md). Only rendered when
      VITE_GOOGLE_SITE_VERIFICATION is set; see vite.config.ts for the
      build-time injection. Never hardcode a token here.
    -->
    <!--GOOGLE_SITE_VERIFICATION_META-->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">

    <!-- Google Identity Services for OAuth -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Innovax Technologies",
      "url": "https://innovacar.app",
      "logo": "https://innovacar.app/brand/innovacar-logo.png",
      "description": "Innovax Technologies builds Innovacar, a car rental management platform for rental agencies.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://innovacar.app/#/contact"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
