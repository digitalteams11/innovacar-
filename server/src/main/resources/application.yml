spring:
  application:
    name: location-car

  profiles:
    active: "${SPRING_PROFILES_ACTIVE:dev}"

  datasource:
    # No localhost fallback here on purpose — every deployed environment (including
    # Railway) must set these explicitly. Local dev gets its own default via
    # application-dev.yml, which only loads when SPRING_PROFILES_ACTIVE=dev.
    # If DATABASE_URL (Railway/Neon postgres:// form) is set instead of
    # SPRING_DATASOURCE_URL, DatabaseUrlEnvironmentPostProcessor converts it to a
    # jdbc:postgresql:// URL (+ sslmode) before this placeholder is resolved.
    url: "${SPRING_DATASOURCE_URL}"
    username: "${SPRING_DATASOURCE_USERNAME}"
    password: "${SPRING_DATASOURCE_PASSWORD}"
    driver-class-name: "${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}"
    # Bounded for a container-limited Railway Postgres plan — without an explicit
    # cap, Hikari defaults to maximumPoolSize=10/minimumIdle=10, which a small
    # plan's real connection limit can't always absorb across multiple app
    # instances/redeploys. A checked-out connection that can't be obtained fails
    # fast (10s) with a clear exception instead of a request thread hanging for
    # Hikari's 30s default — the difference between one slow endpoint and Tomcat's
    # whole thread pool (including /health) eventually starving.
    hikari:
      maximum-pool-size: "${DB_POOL_MAX_SIZE:5}"
      minimum-idle: "${DB_POOL_MIN_IDLE:1}"
      connection-timeout: "${DB_POOL_CONNECTION_TIMEOUT_MS:10000}"
      idle-timeout: "${DB_POOL_IDLE_TIMEOUT_MS:300000}"
      max-lifetime: "${DB_POOL_MAX_LIFETIME_MS:1200000}"
      leak-detection-threshold: "${DB_POOL_LEAK_DETECTION_MS:20000}"


  flyway:
    enabled: "${SPRING_FLYWAY_ENABLED:false}"
    locations: classpath:db/migration
    # If a target database already has the full schema applied outside Flyway
    # (see server/scripts/bootstrap/baseline-core-schema.sql — the one-time
    # manual bootstrap for a brand-new database) but has no flyway_schema_history
    # table yet, Flyway auto-inserts a synthetic "baseline" row at
    # baseline-version instead of trying to replay every historical migration
    # against it. Kept at 57 (the latest migration as of the bootstrap script)
    # so only V58+ ever actually execute against a bootstrapped database.
    baseline-on-migrate: true
    baseline-version: "${SPRING_FLYWAY_BASELINE_VERSION:57}"
    validate-on-migrate: true
    out-of-order: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 50MB

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    # SQL echo defaults to off — Hibernate's show-sql writes straight to stdout
    # (not through SLF4J), so leaving it on in production floods the log
    # pipeline. application-dev.yml re-enables it for local development.
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: "${SPRING_JPA_HIBERNATE_DDL_AUTO:update}"
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false

  task:
    scheduling:
      enabled: true

  mvc:
    # Required so an unmapped URL reaches GlobalExceptionHandler's
    # NoHandlerFoundException handler (JSON) instead of falling through to
    # the static-resource handler and then the whitelabel HTML error page.
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

server:
  address: 0.0.0.0
  # Railway assigns a dynamic port via $PORT and expects the app to bind to it.
  port: "${PORT:8080}"
  # Railway's edge proxy terminates TLS and forwards plain HTTP with
  # X-Forwarded-* headers; without this, redirects/URLs built from the request
  # (e.g. Location headers) would resolve to the internal http:// origin
  # instead of the public https:// one.
  forward-headers-strategy: framework
  tomcat:
    max-http-form-post-size: 50MB
    max-swallow-size: 50MB
  error:
    include-message: always
    include-binding-errors: always
    whitelabel:
      enabled: false

# ── JWT ────────────────────────────────────────────────────────────────────────
app:
  jwt:
    # 256-bit Base64-encoded secret. Set JWT_SECRET in every deployed environment.
    secret: "${JWT_SECRET:dGhpc0lzQVNlY3JldEtleUZvckp3dFRva2VuR2VuZXJhdGlvbkluRGV2T25seSEh}"
    expiration-ms: 86400000       # 24h access token
    refresh-expiration-ms: 604800000  # 7 days refresh token

  # ── Rate Limiting ────────────────────────────────────────────────────────────
  rate-limit:
    login:
      max-attempts: 5
      window-minutes: 15
      lockout-minutes: 30
    password-reset:
      max-attempts: 3
      window-minutes: 60
    email-verification:
      max-attempts: 5
      window-minutes: 60

  # ── Public frontend origin used to build contract signing links / QR codes,
  # password reset / verification emails, and the public web app URL exposed
  # via PUBLIC_WEB_URL. Must be a bare origin (no trailing slash, no /# hash
  # prefix) — the backend appends the HashRouter "/#/contract-sign/..." path
  # itself. In production, set FRONTEND_URL (or PUBLIC_WEB_URL as an alias) to
  # the real public domain, e.g. https://innovacar.app — this is the single
  # source of truth; client requests can no longer override it.
  frontend-url: "${FRONTEND_URL:${PUBLIC_WEB_URL:http://localhost:5173}}"

  # ── Custom domain / white-label subdomain resolution ─────────────────────────
  domain:
    base-domain: "${APP_BASE_DOMAIN:innovacar.app}"
    cname-target: "${APP_CNAME_TARGET:app.innovacar.app}"

  # ── CORS ───────────────────────────────────────────────────────────────────
  # Canonical production origins only — this base default applies whenever no
  # more specific profile document overrides it. LAN-dev origins (localhost,
  # 192.168.*) are added on top of this in application-dev.yml only, so a
  # deploy that forgets to activate a profile still fails safe to prod-only
  # CORS rather than accidentally allowing a dev origin. Override via
  # CORS_ALLOWED_ORIGINS (comma-separated, no wildcards) if a third origin is
  # ever added.
  cors:
    allowed-origins: "${CORS_ALLOWED_ORIGINS:https://innovacar.app,https://www.innovacar.app}"

  # ── Google OAuth ─────────────────────────────────────────────────────────────
  google:
    client-id: ""
    # Configure your Google OAuth 2.0 client ID above for production use.
    # Get one at: https://console.cloud.google.com/apis/credentials

  security:
    password:
      expiration-days: 90

  bootstrap:
    super-admin:
      enabled: "${APP_BOOTSTRAP_SUPER_ADMIN_ENABLED:false}"
      email: "${APP_BOOTSTRAP_SUPER_ADMIN_EMAIL:superadmin@test.com}"
      password: "${APP_BOOTSTRAP_SUPER_ADMIN_PASSWORD:password}"
    demo:
      enabled: "${APP_BOOTSTRAP_DEMO_ENABLED:true}"
      admin-email: "${APP_BOOTSTRAP_DEMO_ADMIN_EMAIL:admin@test.com}"
      admin-password: "${APP_BOOTSTRAP_DEMO_ADMIN_PASSWORD:password}"
    # Secure one-time production bootstrap for the first real SUPER_ADMIN
    # account (see SuperAdminBootstrapRunner). Distinct from the demo/legacy
    # bootstrap above — no insecure defaults, runs at most once.
    superadmin:
      enabled: "${BOOTSTRAP_SUPERADMIN_ENABLED:false}"
      email: "${BOOTSTRAP_SUPERADMIN_EMAIL:}"
      password: "${BOOTSTRAP_SUPERADMIN_PASSWORD:}"
      name: "${BOOTSTRAP_SUPERADMIN_NAME:}"

  # ── Auth cookies (access/refresh token cookies set by AuthCookieService) ────
  # Cross-site production (Vercel frontend + Railway backend on different
  # subdomains) requires Secure=true + SameSite=None, or browsers will silently
  # drop the cookie. Local LAN dev runs over plain HTTP, where Secure cookies
  # are dropped entirely — hence the Lax/false dev defaults below; the bearer
  # token response is the primary auth transport in that case instead.
  auth:
    cookies:
      secure: "${AUTH_COOKIE_SECURE:false}"
      same-site: "${AUTH_COOKIE_SAME_SITE:Lax}"
      domain: "${AUTH_COOKIE_DOMAIN:}"

  # Shared default retention for every entity's Trash, unless overridden below.
  trash:
    retention-days: "${TRASH_RETENTION_DAYS:30}"

  contracts:
    # Number of days a deleted contract stays in Trash before auto-purge.
    trash-retention-days: "${CONTRACT_TRASH_RETENTION_DAYS:${TRASH_RETENTION_DAYS:30}}"
    trash-purge:
      cron: "${CONTRACT_TRASH_PURGE_CRON:0 30 3 * * *}"

  vehicles:
    # Number of days a deleted vehicle stays in Trash before auto-purge.
    trash-retention-days: "${VEHICLE_TRASH_RETENTION_DAYS:${TRASH_RETENTION_DAYS:30}}"
    trash-purge:
      cron: "${VEHICLE_TRASH_PURGE_CRON:0 45 3 * * *}"

  storage:
    path: "${APP_STORAGE_PATH:storage}"
  inspection:
    storage-dir: "${APP_INSPECTION_STORAGE_DIR:uploads/inspections}"
  branding:
    storage-dir: "${APP_BRANDING_STORAGE_DIR:uploads/branding}"

  backup:
    path: "${BACKUP_PATH:${APP_STORAGE_PATH:storage}/backups}"
    pg-dump: "${PG_DUMP_PATH:pg_dump}"
    pg-restore: "${PG_RESTORE_PATH:pg_restore}"
    restore-enabled: "${BACKUP_RESTORE_ENABLED:false}"
    schedule:
      daily: "${BACKUP_DAILY_CRON:0 0 2 * * *}"
      weekly: "${BACKUP_WEEKLY_CRON:0 30 2 * * SUN}"
      monthly: "${BACKUP_MONTHLY_CRON:0 0 3 1 * *}"
    retention:
      daily-days: "${BACKUP_DAILY_RETENTION_DAYS:14}"
      weekly-days: "${BACKUP_WEEKLY_RETENTION_DAYS:90}"
      monthly-days: "${BACKUP_MONTHLY_RETENTION_DAYS:730}"

  # ── Encryption ──────────────────────────────────────────────────────────────
  # Must be stable between restarts. Set APP_ENCRYPTION_SECRET in production.
  # If this value ever changes, all encrypted DB values (API keys) become
  # unreadable and users must re-enter them.
  encryption:
    secret: "${APP_ENCRYPTION_SECRET:changeme-in-production-32bytes!}"

  # ── Email delivery provider ───────────────────────────────────────────────────
  # All email sends via ZeptoMail's HTTPS transactional API (port 443) —
  # SMTP (465/587) is never attempted. Railway blocks outbound SMTP ports at
  # the network level, so no SMTP configuration could ever succeed there.
  email:
    api-base-url: "${EMAIL_API_BASE_URL:}"
    # Never log this value. Not exposed to the frontend anywhere.
    # ZEPTOMAIL_API_TOKEN is the canonical name; EMAIL_API_TOKEN is kept as a
    # fallback in case that's what's actually set on Railway.
    api-token: "${ZEPTOMAIL_API_TOKEN:${EMAIL_API_TOKEN:}}"
    from-email: "${EMAIL_FROM_EMAIL:}"
    from-name: "${EMAIL_FROM_NAME:RentCar}"

  # ── AI / Gemini ──────────────────────────────────────────────────────────────
  # Backend-only. Used only to seed the AiSettings row the first time it is
  # created — after that, Super Admin → Settings → AI & Automation (stored
  # encrypted in the database) is the source of truth. The key is never read
  # by, or exposed to, the frontend.
  ai:
    dev-mode: "${AI_DEV_MODE:false}"
    groq:
      api-key: "${GROQ_API_KEY:}"
      default-model: "${GROQ_MODEL_TEXT:llama-3.3-70b-versatile}"
    # Legacy Gemini env vars are no longer read at startup — the V51 migration
    # carries any existing DB-stored Gemini config forward into ai_providers.
    # Kept here only as documentation for already-migrated installs.
    gemini:
      api-key: "${GEMINI_API_KEY:}"

# ── Whop Integration ──────────────────────────────────────────────────────────
# Set WHOP_API_KEY and WHOP_WEBHOOK_SECRET environment variables in production.
# The API key is NEVER exposed to the frontend.
whop:
  api:
    key: "${WHOP_API_KEY:}"
    base-url: "https://api.whop.com"
  webhook:
    secret: "${WHOP_WEBHOOK_SECRET:}"

